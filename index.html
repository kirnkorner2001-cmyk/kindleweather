<!DOCTYPE html>
<html lang="cs">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta name="viewport"
          content="width=320, initial-scale=1, maximum-scale=1, user-scalable=0, target-densitydpi=medium-dpi">
    <script src="vendor/moment/moment-with-locales.js" type="text/javascript"></script>
    <script src="config.js" type="text/javascript"></script>
    <link rel="stylesheet" type="text/css" href="vendor/weathericons/css/weather-icons.css"/>
    <link rel="stylesheet" type="text/css" href="css/custom-icons.css"/>
    <link rel="stylesheet" type="text/css" href="css/kindle.css"/>

    <script type="text/javascript">
        var apiProtocol = window.location.protocol === 'file:' ? 'https:' : window.location.protocol;

        var jsonp = function () {
            return {
                request: function (src, callback, id) {
                    try {
                        var self = this, script = null;
                        self.done = false;
                        if (typeof id === "undefined") { id = "jsonp"; }
                        if (document.getElementById(id) !== null) {
                            script = document.getElementById(id);
                            document.body.removeChild(script);
                        }
                        script = document.createElement('script');
                        script.type = 'application/javascript';
                        script.id = id;
                        script.src = src;
                        script.onload = function () {
                            if (typeof callback !== "undefined") { callback(self.responseObject); }
                            script.onload = null; document.body.removeChild(script); script = null;
                        };
                        document.body.appendChild(script);
                    } catch (exception) {}
                },
                response: function (response) { try { this.responseObject = response; } catch (exception) {} }
            }
        }();

        function refreshActualWeather() {
            jsonp.request(apiProtocol + "//api.openweathermap.org/data/2.5/weather?" + _apiParams + "&callback=jsonp.response" + "&_timestamp=" + (new Date()).getTime()
                , function (data) { processActualWeather(data); }, "actualScript");
        }

        function refreshForecastWeather() {
            var forecastPath = forecastType === "daily" ? "forecast/daily" : "forecast";
            var url = apiProtocol + "//api.openweathermap.org/data/2.5/" + forecastPath + "?" + _apiParams;
            if (forecastType === "daily") { url += "&cnt=" + forecastCount; }
            jsonp.request(url + "&callback=jsonp.response" + "&_timestamp=" + (new Date()).getTime()
                , function (data) { processForecastWeather(data); }, "forecastScript");
        }

        // ORIGINAL SURVIVAL CODE RESTORED HERE
        function refreshData() {
            var d = new Date();
            var h = d.getUTCHours();
            var m = d.getUTCMinutes();
            var isReloaded = getUrlParameter("reloaded") === "true";

            // Trigger Memory Wipe Windows: 6:00 UTC and 19:00 UTC (1:00 AM / 2:00 PM Central)
            if ((h === 6 || h === 19) && m <= 31 && !isReloaded) {
                window.location.href = window.location.pathname + "?reloaded=true";
                return; 
            }

            setNightMode();
            refreshActualWeather();
            refreshForecastWeather();
            if (!rtcSleepMode) {
                window.setTimeout("refreshData()", refreshTime);
            }
        }

        function processForecastWeather(data) {
            dataTimeZone = data.city.timezone
            var count = Math.min(forecastCount, data.list.length);
            for (var i = 0; i < count; i++) {
                var forecast = data.list[i];
                if (forecastType === "daily") {
                    var minTemp = Math.round(forecast.temp.min);
                    var maxTemp = Math.round(forecast.temp.max);
                    forecastsCells[i].temp.innerHTML = minTemp + "/" + maxTemp + unitsSymbolHtml;
                    forecastsCells[i].icon.className = getIconClassName(forecast.weather[0], new Date(forecast.dt * 1000));
                    forecastsCells[i].desc.innerHTML = forecast.weather[0].description;
                    forecastsCells[i].time.innerHTML = momentWithCorrectUtcOffset(new Date(forecast.dt * 1000)).format("ddd");
                    forecastsCells[i].temp.className = "colTemp";
                } else {
                    var feelsLike = tempType == "feelsLike";
                    forecastsCells[i].temp.innerHTML = (feelsLike ? Math.round(forecast.main.feels_like) : Math.round(forecast.main.temp)) + unitsSymbolHtml;
                    forecastsCells[i].icon.className = getIconClassName(forecast.weather[0], new Date(forecast.dt * 1000));
                    forecastsCells[i].desc.innerHTML = forecast.weather[0].description;
                    forecastsCells[i].time.innerHTML = momentWithCorrectUtcOffset(new Date(forecast.dt * 1000)).format(timeFormat);
                    forecastsCells[i].temp.className = feelsLike ? "colTemp feelsLike" : "colTemp";
                }
                forecastsCells[i].icon.style.transform = null;
                forecastsCells[i].icon.style.webkitTransform = null;
            }
            setMoonIconsRotation(data.city.coord.lat)
        }

        function getIconClassName(weather, date) {
            var isNight = weather.icon.slice(-1) === "n";
            if (isNight && weather.id == 800) {
                var phase = getMoonPhaseFromDate(date);
                var icon = getMoonIconClasses(phase, isNightMode());
                return icon;
            }
            return "wi wi-owm-" + (isNight ? "night-" : "day-") + weather.id;
        }

        function setsUnitsSymbolFromApiUrl(url) {
            if (url.indexOf("units=metric") >= 0) { unitsSymbolHtml = "<i class='wi wi-celsius'></i>"; return }
            if (url.indexOf("units=imperial") >= 0) { unitsSymbolHtml = "<i class='wi wi-fahrenheit'></i>"; return }
            unitsSymbolHtml = "<span>K</span>";
        }

        function getApiParams() {
            if (getUrlParameter("api_params")) {
                var url = getUrlParameter("api_params"); setsUnitsSymbolFromApiUrl(url); return url;
            }
            if (api_params) {
                var url = api_params; setsUnitsSymbolFromApiUrl(url); return url;
            }
            var appId = getUrlParameter("appId") ? getUrlParameter("appId") : api_appId;
            var lang = getUrlParameter("lang") ? getUrlParameter("lang") : (api_lang || "en");
            if (typeof(lang) === 'string') { lang = lang.split(";", 1); }
            var units = getUrlParameter("units") ? getUrlParameter("units") : (api_units || "metric");
            var locParams = api_locParams;
            if (getUrlParameter("city")) { locParams = "q=" + encodeURIComponent(getUrlParameter("city")); } 
            else if (getUrlParameter("lat") && getUrlParameter("lon")) { locParams = "lat=" + encodeURIComponent(getUrlParameter("lat")) + "&lon=" + encodeURIComponent(getUrlParameter("lon")); }
            if (!locParams || !appId) { return null; }
            var url = locParams + "&appid=" + appId + "&lang=" + lang + "&units=" + units;
            setsUnitsSymbolFromApiUrl(url);
            return url;
        }

        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + RegExp.escape(name) + '=([^&#]*)');
            var results = regex.exec(location.search);
            if (!results) return null; if (!results[1]) return '';
            return decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        RegExp.escape = function (s) { return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'); };

        function processActualWeather(data) {
            dataTimeZone = data.timezone;
            var feelsLike = tempType == "feelsLike";
            icon.className = getIconClassName(data.weather[0], new Date(data.dt * 1000));
            icon.style.transform = null; icon.style.webkitTransform = null;
            temp.innerHTML = feelsLike ? Math.round(data.main.feels_like) : Math.round(data.main.temp);
            temp.className = feelsLike ? "feelsLike" : "";
            city.innerHTML = data.name; description.innerHTML = data.weather[0].description;
            lastUpdate.innerHTML = momentWithCorrectUtcOffset(new Date()).format(timeFormat) + "/" + momentWithCorrectUtcOffset(new Date(data.dt * 1000)).format(timeFormat);
            date.innerHTML = momentWithCorrectUtcOffset(new Date()).format("dd, ll");
            var sunrise = momentWithCorrectUtcOffset(new Date(data.sys.sunrise * 1000));
            var sunset = momentWithCorrectUtcOffset(new Date(data.sys.sunset * 1000));
            _sunriseHour = sunrise.hour(); _sunsetHour = sunset.hour();
            sun.innerHTML = "<i class='" + getMoonIconClasses(getCurrentMoonPhase(), isNightMode()) + "'></i>&nbsp;&nbsp;<i class='wi wi-sunrise'></i> " + sunrise.format(timeFormat)
                    + "&nbsp;&nbsp;<i class='wi wi-sunset'></i> " + sunset.format(timeFormat);
            setNightMode(); setMoonIconsRotation(data.coord.lat);
        }

        function getMoonPhase(year, month, day) {
            var lp = 2551443;
            var now = new Date(year, month - 1, day, 20, 35, 0);
            var new_moon = new Date(1970, 0, 7, 20, 35, 0);
            var phase = ((now.getTime() - new_moon.getTime()) / 1000) % lp;
            return phase / lp;
        }

        function getMoonPhaseFromDate(date) {
            var lp = 2551443; var new_moon = new Date(1970, 0, 7, 20, 35, 0);
            return (((date.getTime() - new_moon.getTime()) / 1000) % lp) / lp;
        }

        function getCurrentMoonPhase() {
            var now = new Date(); return getMoonPhase(now.getFullYear(), now.getMonth() + 1, now.getDate());
        }

        function getMoonIconClasses(phase, isNightMode) {
            var iconInterval = 1 / moonIcons.length; var index = Math.floor(phase / iconInterval);
            return "wi " + moonIcons[index][isNightMode ? 1 : 0] + " moonIcon " + (phase < 0.5 ? "moonFirstHalf" : "moonSecondHalf");
        }

        function setMoonIconsRotation(latitude) {
            var rotation = (latitude - 90); var elements = document.getElementsByClassName("moonIcon");
            for (var i = 0; i < elements.length; i++) {
                var direction = elements[i].className.indexOf("moonFirstHalf") !== -1 ? -1 : 1;
                var transform = "rotate(" + (rotation * direction) + "deg)";
                elements[i].style.transform = transform; elements[i].style.webkitTransform = transform;
            }
        }

        var cleaner, page, temp, icon, city, description, lastUpdate, date, sun, lang;
        var forecastsCells = null; var forecastCount = 5; var forcedRotation = false; var unitsSymbolHtml = "";
        var moonIcons = [ ["wi-moon-alt-new", "wi-moon-alt-full"], ["wi-moon-alt-waxing-crescent-1","wi-moon-alt-waning-gibbous-1"], ["wi-moon-alt-waxing-crescent-2","wi-moon-alt-waning-gibbous-2"], ["wi-moon-alt-waxing-crescent-3","wi-moon-alt-waning-gibbous-3"], ["wi-moon-alt-waxing-crescent-4","wi-moon-alt-waning-gibbous-4"], ["wi-moon-alt-waxing-crescent-5","wi-moon-alt-waning-gibbous-5"], ["wi-moon-alt-waxing-crescent-6","wi-moon-alt-waning-gibbous-6"], ["wi-moon-alt-first-quarter","wi-moon-alt-third-quarter"], ["wi-moon-alt-waxing-gibbous-1","wi-moon-alt-waning-crescent-1"], ["wi-moon-alt-waxing-gibbous-2","wi-moon-alt-waning-crescent-2"], ["wi-moon-alt-waxing-gibbous-3","wi-moon-alt-waning-crescent-3"], ["wi-moon-alt-waxing-gibbous-4","wi-moon-alt-waning-crescent-4"], ["wi-moon-alt-waxing-gibbous-5","wi-moon-alt-waning-crescent-5"], ["wi-moon-alt-waxing-gibbous-6","wi-moon-alt-waning-crescent-6"], ["wi-moon-alt-full","wi-moon-alt-new"], ["wi-moon-alt-waning-gibbous-1","wi-moon-alt-waxing-crescent-1"], ["wi-moon-alt-waning-gibbous-2","wi-moon-alt-waxing-crescent-2"], ["wi-moon-alt-waning-gibbous-3","wi-moon-alt-waxing-crescent-3"], ["wi-moon-alt-waning-gibbous-4","wi-moon-alt-waxing-crescent-4"], ["wi-moon-alt-waning-gibbous-5","wi-moon-alt-waxing-crescent-5"], ["wi-moon-alt-waning-gibbous-6","wi-moon-alt-waxing-crescent-6"], ["wi-moon-alt-third-quarter","wi-moon-alt-first-quarter"], ["wi-moon-alt-waning-crescent-1","wi-moon-alt-waxing-gibbous-1"], ["wi-moon-alt-waning-crescent-2","wi-moon-alt-waxing-gibbous-2"], ["wi-moon-alt-waning-crescent-3","wi-moon-alt-waxing-gibbous-3"], ["wi-moon-alt-waning-crescent-4","wi-moon-alt-waxing-gibbous-4"], ["wi-moon-alt-waning-crescent-5","wi-moon-alt-waxing-gibbous-5"], ["wi-moon-alt-waning-crescent-6","wi-moon-alt-waxing-gibbous-6"] ];
        var timeFormat = "h:mm";
        var api_params, api_appId, api_lang, api_units, api_locParams, rotation, night_mode, refreshTime, utcOffset, tempType, forecastType, rtcSleepMode, rtcWakeDelay;

        utcOffset = getUrlParameter("utcOffset") ? getUrlParameter("utcOffset") : utcOffset;
        tempType = getUrlParameter("tempType") ? getUrlParameter("tempType") : tempType;
        forecastType = getUrlParameter("forecastType") ? getUrlParameter("forecastType") : forecastType;
        refreshTime = getUrlParameter("refreshTime") ? getUrlParameter("refreshTime") * 60 * 1000 : refreshTime;
        rtcSleepMode = getUrlParameter("rtcSleepMode") ? getUrlParameter("rtcSleepMode") === "true" : !!rtcSleepMode;
        rtcWakeDelay = getUrlParameter("rtcWakeDelay") ? getUrlParameter("rtcWakeDelay") * 1000 : rtcWakeDelay;

        var dataTimeZone = 0; var _sunsetHour = 18; var _sunriseHour = 6; var _apiParams = null;

        if (!refreshTime) { refreshTime = 30 * 60 * 1000; }
        if (!rtcWakeDelay) { rtcWakeDelay = 15 * 1000; }
        if (!forecastType) { forecastType = "hour"; }

        function rotate() {
            var rot = getUrlParameter("rotation") ? getUrlParameter("rotation") : rotation; var v = viewport();
            var isPortrait = v.height > v.width;
            if (isPortrait && rot === "ll") {
                page.className = "landscape"; forcedRotation = true;
                page.style.transform = "rotate(90deg)"; page.style.transformOrigin = "bottom left"; page.style.webkitTransform = "rotate(90deg)"; page.style.webkitTransformOrigin = "bottom left"; page.style.position = "absolute"; page.style.top = -v.width + "px"; page.style.height = v.width + "px"; page.style.width = v.height + "px";
            } else if (isPortrait && rot === "lr") {
                page.className = "landscape"; forcedRotation = true;
                page.style.transform = "rotate(-90deg)"; page.style.transformOrigin = "bottom right"; page.style.webkitTransform = "rotate(-90deg)"; page.style.webkitTransformOrigin = "top left"; page.style.position = "absolute"; page.style.top = v.height + "px"; page.style.height = v.width + "px"; page.style.width = v.height + "px";
            } else if (rot === "up") {
                page.className = isPortrait ? "portrait" : "landscape"; forcedRotation = false;
                page.style.transform = "rotate(180deg)"; page.style.transformOrigin = "50% 50% 0"; page.style.webkitTransform = "rotate(180deg)"; page.style.webkitTransformOrigin = "50% 50% 0";
            } else {
                page.className = isPortrait ? "portrait" : "landscape"; forcedRotation = false;
                page.style.transform = ""; page.style.transformOrigin = ""; page.style.webkitTransform = ""; page.style.webkitTransformOrigin = ""; page.style.position = ""; page.style.top = ""; page.style.background = ""; page.style.height = ""; page.style.width = "";
            }
        }

        window.addEventListener('load', function () {
            _apiParams = getApiParams(); if (_apiParams === null) { window.location = "config.html"; }
            moment.locale(momentLocale()); cleaner = document.getElementById("cleaner"); page = document.getElementById("page"); temp = document.getElementById("temp"); icon = document.getElementById("icon"); city = document.getElementById("city");
            city.addEventListener('click', function (event) { event.preventDefault(); window.location.href = window.location.href.replace("/index.html", "/config.html"); return false });
            temp.addEventListener('click', function (event) { event.preventDefault(); var newHref = window.location.href.replace(/[&?]tempType=[^&]*/, ""); newHref = newHref + (newHref.indexOf("?") >= 0 ? "&" : "?") + "tempType=" + (tempType === "feelsLike" ? "actual" : "feelsLike"); window.location.href = newHref; return false });
            var forecastContainer = document.getElementById("forecast");
            forecastContainer.addEventListener('click', function (event) { event.preventDefault(); var newHref = window.location.href.replace(/[&?]forecastType=[^&]*/, ""); newHref = newHref + (newHref.indexOf("?") >= 0 ? "&" : "?") + "forecastType=" + (forecastType === "daily" ? "hour" : "daily"); window.location.href = newHref; return false; });
            description = document.getElementById("description"); lastUpdate = document.getElementById("lastUpdate"); date = document.getElementById("date"); sun = document.getElementById("sun"); forecastsCells = [];
            for (var i = 0; i < forecastCount; i++) { forecastsCells.push({ temp: document.getElementById("temp" + (i + 1)), icon: document.getElementById("icon" + (i + 1)), desc: document.getElementById("desc" + (i + 1)), time: document.getElementById("time" + (i + 1)), }); }
            refreshData();

            if (rtcSleepMode) {
                var lastRefresh = new Date().getTime(); var wakeDelayActive = false;
                setInterval(function() {
                    var now = new Date().getTime(); var sinceRefresh = now - lastRefresh;
                    if (sinceRefresh > refreshTime && !wakeDelayActive) {
                        wakeDelayActive = true; setTimeout(function() { lastRefresh = new Date().getTime(); refreshData(); wakeDelayActive = false; }, rtcWakeDelay);
                    }
                }, 1000);
            }

            rotate(); setRem("load"); setNightMode();

            function scheduleWipes() {
                var now = new Date();
                var times = [{ h: 12, m: 02 }, { h: 21, m: 02 }]; 
                
                times.forEach(function(time) {
                    var scheduled = new Date();
                    scheduled.setUTCHours(time.h, time.m, 0, 0);
                    if (scheduled < now) { scheduled.setDate(scheduled.getDate() + 1); }
                    var diff = scheduled.getTime() - now.getTime();
                    
                    setTimeout(function() {
                        clearScreen();
                        setInterval(clearScreen, 24 * 60 * 60 * 1000);
                    }, diff);
                });
            }
            scheduleWipes();
        });

        window.addEventListener("resize", function() { rotate(); setRem("resize"); });

        function viewport() {
            var e = window, a = 'inner';
            if (!('innerWidth' in window )) { a = 'client'; e = document.documentElement || document.body; }
            return { width : e[ a+'Width' ] , height : e[ a+'Height' ] };
        }

        function setRem(prefix) { var v = viewport(); var root = document.querySelector(":root"); root.style.fontSize = ((forcedRotation === false ? v.height : v.width) / 100) + "px"; }
        function setNightMode() { var root = document.querySelector(":root"); if (isNightMode()) { root.className = "night"; } else { root.className = null; } }
        function isNightMode() {
            var mode = getUrlParameter("night") ? getUrlParameter("night") : night_mode;
            if (mode === "on") { return true; } if (mode === "auto") { return isNight(_sunsetHour, _sunriseHour); }
            var found = mode && mode.match(/([0-9][0-9]?)-([0-9][0-9]?)/);
            if (found) { return isNight(found[1], found[2]); } return false;
        }

        function isNight(f, t) {
            var from = parseInt(f); var to = parseInt(t); var now = momentWithCorrectUtcOffset(new Date()).hour();
            if (from > to) { return from <= now || to > now; } else { return from <= now && to > now; }
        }

        function momentLocale() {
            var lang = getUrlParameter("lang") ? getUrlParameter("lang") : api_lang;
            if (typeof(lang) === 'string') { var langs = lang.split(";", 2); return langs.length > 1 ? langs[1] : langs[0]; } else { return null; }
        }

        function clearScreen(times) {
            if (typeof(times) == 'undefined') { times = 5; }
            if (times <= 0) { cleaner.style.display = 'none'; return; }
            cleaner.style.display = 'block'; cleaner.style.background = times % 2 == 0 ? "#ffffff" : "#000000";
            window.setTimeout(function () { clearScreen(times - 1); }, 500);
        }

        function momentWithCorrectUtcOffset(dateTime) {
            if (typeof(utcOffset) === 'undefined' || utcOffset === null || utcOffset === "") { return moment(dateTime).utcOffset(dataTimeZone / 60, false); } 
            else if (utcOffset === 'local') { return moment(dateTime); } else { return moment(dateTime).utcOffset(utcOffset, false); }
        }
    </script>
</head>
<body>
<div id="page">
    <a id="city" href="./config.html"></a>
    <div id="iconWrapper"><i id="icon"></i></div>
    <div class="tempWrapper"><div id="temp"></div></div>
    <div id="description"></div>
    <div id="lastUpdate"></div>
    <div class="forecast" id="forecast">
        <div class="col col1"><div id="time1" class="colTime"></div><div class="forecastIconWrapper"><i id="icon1" class="colIcon"></i></div><div id="temp1" class="colTemp"></div><div id="desc1" class="colDesc"></div></div>
        <div class="col col2"><div id="time2" class="colTime"></div><div class="forecastIconWrapper"><i id="icon2" class="colIcon"></i></div><div id="temp2" class="colTemp"></div><div id="desc2" class="colDesc"></div></div>
        <div class="col col3"><div id="time3" class="colTime"></div><div class="forecastIconWrapper"><i id="icon3" class="colIcon"></i></div><div id="temp3" class="colTemp"></div><div id="desc3" class="colDesc"></div></div>
        <div class="col col4"><div id="time4" class="colTime"></div><div class="forecastIconWrapper"><i id="icon4" class="colIcon"></i></div><div id="temp4" class="colTemp"></div><div id="desc4" class="colDesc"></div></div>
        <div class="col col5"><div id="time5" class="colTime"></div><div class="forecastIconWrapper"><i id="icon5" class="colIcon"></i></div><div id="temp5" class="colTemp"></div><div id="desc5" class="colDesc"></div></div>
    </div>
    <div id="date"></div>
    <div id="sun"></div>
</div>
<div id="cleaner"></div>
</body>
</html>
